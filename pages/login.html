<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MindKey</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Inter:wght@400;500&family=Newsreader:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <img src="../assets/images/owl_mascot.png" alt="MindKey Logo" class="login-logo">
            <h2>Masuk ke MindKey</h2>
            <p>Silakan masuk menggunakan akun Gmail Anda untuk melanjutkan.</p>
            
            <button class="google-btn" onclick="loginUser()">
                <i class="fab fa-google"></i>
                Lanjutkan dengan Gmail
            </button>
            
            <a href="admin.html" class="admin-link">Login sebagai Admin</a>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-config.js"></script>
    <script src="../assets/js/ui.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        if (localStorage.getItem('mindkey_user')) {
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
