<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktivasi Premium - MindKey</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Inter:wght@400;500&family=Newsreader:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .activation-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-cream);
            padding: 2rem;
        }

        .activation-card {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 12px 32px rgba(68, 42, 34, 0.08);
            text-align: center;
        }

        .activation-logo {
            width: 80px;
            margin-bottom: 1.5rem;
        }

        .activation-card h2 {
            font-family: 'Newsreader', serif;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        .activation-card p {
            color: var(--text-light);
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .token-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            transition: border-color 0.3s;
        }

        .token-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-activate {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .btn-activate:hover {
            transform: translateY(-2px);
            background: #2a1914;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .status-message {
            margin-top: 1rem;
            font-weight: 500;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="activation-page">
        <div class="activation-card">
            <img src="owl_mascot.png" alt="MindKey Logo" class="activation-logo" onerror="this.src='images/owl_mascot.png'">
            <h2>Aktivasi Premium</h2>
            <p>Masukkan Token Aplikasi yang Anda dapatkan setelah pembayaran disetujui.</p>
            
            <input type="text" id="tokenInput" class="token-input" placeholder="MIND-XXXXXX" autocomplete="off">
            
            <button class="btn-activate" id="activateBtn" onclick="processActivation()">
                <i class="fas fa-key"></i> Validasi Token
            </button>
            <div id="activationStatus" class="status-message"></div>
            
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('mindkey_premium') === 'true') {
                document.getElementById('activationStatus').innerHTML = '<span style="color:#10b981;">Aplikasi Anda sudah Premium!</span>';
                document.getElementById('tokenInput').style.display = 'none';
                document.getElementById('activateBtn').style.display = 'none';
            }
        });

        async function processActivation() {
            const tokenInput = document.getElementById('tokenInput').value.trim();
            const btn = document.getElementById('activateBtn');
            const status = document.getElementById('activationStatus');
            
            if (!tokenInput) {
                showToast("Masukkan token terlebih dahulu", "error");
                return;
            }
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memvalidasi...';
            btn.disabled = true;
            status.textContent = '';
            
            const isValid = await verifyAppToken(tokenInput);
            
            if (isValid) {
                status.innerHTML = '<span style="color:#10b981;"><i class="fas fa-check-circle"></i> Token Valid! Aplikasi Premium Diaktifkan.</span>';
                showToast("Aktivasi Berhasil!", "success");
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } else {
                status.innerHTML = '<span style="color:#dc2626;"><i class="fas fa-times-circle"></i> Token tidak valid atau belum disetujui.</span>';
                showToast("Aktivasi Gagal!", "error");
                btn.innerHTML = '<i class="fas fa-key"></i> Validasi Token';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
